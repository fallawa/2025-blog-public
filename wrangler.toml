main = ".open-next/worker.js"
name = "2025-blog-public"
compatibility_date = "2025-03-25"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[build]
command = "pnpm run build:cf"

[observability]
[observability.logs]
enabled = true
# 头部采样率，1 表示 100% 采样（所有请求都会被采样）
head_sampling_rate = 1
# 启用调用日志（记录每次函数调用）
invocation_logs = true
# 持久化日志到磁盘（本地开发时有用）
persist = true
# ✅ 普通环境变量可以写在这里
[vars]
NEXT_PUBLIC_GITHUB_OWNER = "fallawa"
NEXT_PUBLIC_GITHUB_REPO = "2025-blog-public"
NEXT_PUBLIC_GITHUB_BRANCH = "main"
NEXT_PUBLIC_GITHUB_APP_ID = "3665032"
NEXT_PUBLIC_GITHUB_ENCRYPT_KEY = "myblog2026"
